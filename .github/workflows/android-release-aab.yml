name: Build Android release AAB

on:
  workflow_dispatch:
    inputs:
      version_code:
        description: Play Console versionCode. 업로드할 때마다 1씩 올리세요.
        required: true
        default: '1'
      version_name:
        description: 사용자에게 표시되는 versionName.
        required: true
        default: '1.0.0'
      keystore_password:
        description: (선택) keystore 비밀번호. 비워두면 자동 생성됩니다. 첫 빌드 후 반드시 같은 값을 계속 사용해야 합니다.
        required: false
        default: ''
      key_password:
        description: (선택) key 비밀번호. 비워두면 keystore 비밀번호와 동일하게 사용됩니다.
        required: false
        default: ''
      key_alias:
        description: (선택) key alias.
        required: false
        default: 'zibda'

jobs:
  build-aab:
    name: Generate signed app-release.aab
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses >/dev/null
          sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build web app
        run: bun run build

      - name: Create Android platform
        run: |
          if [ ! -d android ]; then
            bunx cap add android
          fi
          bunx cap sync android

      - name: Resolve signing credentials
        id: signing
        env:
          SECRET_KS_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          SECRET_KS_PW: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          SECRET_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          SECRET_KEY_PW: ${{ secrets.ANDROID_KEY_PASSWORD }}
          INPUT_KS_PW: ${{ github.event.inputs.keystore_password }}
          INPUT_KEY_PW: ${{ github.event.inputs.key_password }}
          INPUT_KEY_ALIAS: ${{ github.event.inputs.key_alias }}
        run: |
          set -e
          mkdir -p release

          if [ -n "$SECRET_KS_B64" ] && [ -n "$SECRET_KS_PW" ] && [ -n "$SECRET_KEY_ALIAS" ] && [ -n "$SECRET_KEY_PW" ]; then
            echo "🔐 Using keystore from GitHub Secrets."
            printf '%s' "$SECRET_KS_B64" | base64 --decode > android/zibda-release.keystore
            KS_PW="$SECRET_KS_PW"
            KEY_PW="$SECRET_KEY_PW"
            KEY_ALIAS="$SECRET_KEY_ALIAS"
            GENERATED="false"
          else
            echo "⚠️  Secrets 가 비어 있어 임시 keystore 를 자동 생성합니다."
            echo "⚠️  Artifacts 의 zibda-release-keystore 를 반드시 안전한 곳에 보관하세요."
            echo "⚠️  같은 키로 계속 서명해야 Play Store 업데이트가 가능합니다."

            KS_PW="${INPUT_KS_PW:-zibda$(date +%s)}"
            KEY_PW="${INPUT_KEY_PW:-$KS_PW}"
            KEY_ALIAS="${INPUT_KEY_ALIAS:-zibda}"

            keytool -genkeypair -v \
              -keystore android/zibda-release.keystore \
              -alias "$KEY_ALIAS" \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass "$KS_PW" -keypass "$KEY_PW" \
              -dname "CN=Zibda, OU=Mobile, O=Zibda, L=Cheongju, ST=Chungbuk, C=KR"

            cp android/zibda-release.keystore release/zibda-release.keystore
            base64 -w0 android/zibda-release.keystore > release/zibda-release.keystore.base64.txt
            {
              echo "=== 다음 4개 값을 GitHub Secrets 에 등록하세요 (Settings → Secrets and variables → Actions) ==="
              echo ""
              echo "ANDROID_KEYSTORE_BASE64   = (zibda-release.keystore.base64.txt 의 내용 전체 복사)"
              echo "ANDROID_KEYSTORE_PASSWORD = $KS_PW"
              echo "ANDROID_KEY_ALIAS         = $KEY_ALIAS"
              echo "ANDROID_KEY_PASSWORD      = $KEY_PW"
              echo ""
              echo "⚠️  이 keystore 파일(zibda-release.keystore)을 잃어버리면 Play Store 앱을 영영 업데이트할 수 없습니다."
            } > release/KEYSTORE_CREDENTIALS.txt
            GENERATED="true"
          fi

          echo "ks_pw=$KS_PW" >> "$GITHUB_OUTPUT"
          echo "key_pw=$KEY_PW" >> "$GITHUB_OUTPUT"
          echo "key_alias=$KEY_ALIAS" >> "$GITHUB_OUTPUT"
          echo "generated=$GENERATED" >> "$GITHUB_OUTPUT"

      - name: Prepare Android release settings
        env:
          ANDROID_KEYSTORE_PATH: ../zibda-release.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ steps.signing.outputs.ks_pw }}
          ANDROID_KEY_ALIAS: ${{ steps.signing.outputs.key_alias }}
          ANDROID_KEY_PASSWORD: ${{ steps.signing.outputs.key_pw }}
          ANDROID_VERSION_CODE: ${{ github.event.inputs.version_code }}
          ANDROID_VERSION_NAME: ${{ github.event.inputs.version_name }}
        run: node android-build/ci/prepare-capacitor-android.mjs

      - name: Force app_name to 집다 in strings.xml
        run: |
          set -e
          STRINGS_FILE="android/app/src/main/res/values/strings.xml"
          if [ -f "$STRINGS_FILE" ]; then
            # Replace app_name value while preserving all other string resources
            sed -i 's/<string name="app_name">.*<\/string>/<string name="app_name">집다<\/string>/g' "$STRINGS_FILE"
          else
            echo "Error: strings.xml not found at $STRINGS_FILE"
            exit 1
          fi
          grep 'app_name' "$STRINGS_FILE"




      - name: Validate Android release signing config
        run: |
          node --input-type=module <<'NODE'
          import fs from 'node:fs';

          const gradle = fs.readFileSync('android/app/build.gradle', 'utf8');
          const releaseBuildType = gradle.match(/buildTypes\s*\{[\s\S]*?release\s*\{([\s\S]*?)\n\s*\}/);
          const releaseSigningConfig = gradle.match(/signingConfigs\s*\{[\s\S]*?release\s*\{([\s\S]*?)\n\s*\}/);

          if (!releaseSigningConfig) throw new Error('Missing signingConfigs.release block.');
          if (!releaseBuildType) throw new Error('Missing buildTypes.release block.');
          if (!releaseBuildType[1].includes('signingConfig signingConfigs.release')) {
            throw new Error('buildTypes.release must contain: signingConfig signingConfigs.release');
          }
          if (releaseSigningConfig[1].includes('signingConfig signingConfigs.release')) {
            throw new Error('signingConfig is incorrectly placed inside signingConfigs.release.');
          }
          NODE

      - name: Verify source icon exists
        run: |
          set -e
          if [ ! -f assets/icon-only.png ]; then
            echo "❌ assets/icon-only.png not found — app icon will not be generated."
            exit 1
          fi
          echo "✅ Source icon size: $(stat -c%s assets/icon-only.png) bytes"
          shasum -a 256 assets/icon-only.png

      - name: Remove default Capacitor launcher icons
        run: |
          set -e
          rm -f android/app/src/main/res/mipmap-*/ic_launcher.png \
                android/app/src/main/res/mipmap-*/ic_launcher_round.png \
                android/app/src/main/res/mipmap-*/ic_launcher_foreground.png \
                android/app/src/main/res/mipmap-*/ic_launcher_background.png \
                android/app/src/main/res/mipmap-*/ic_launcher.webp \
                android/app/src/main/res/mipmap-*/ic_launcher_round.webp \
                android/app/src/main/res/mipmap-*/ic_launcher_foreground.webp
          # Also drop stale adaptive-icon XML so we can regenerate cleanly
          rm -f android/app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml \
                android/app/src/main/res/mipmap-anydpi-v26/ic_launcher_round.xml
          echo "Stale default icons removed."

      - name: Ensure icon-only.png is 1024x1024 (no resize if already correct)
        run: |
          set -e
          python3 -m pip install --quiet --disable-pip-version-check Pillow
          cat > /tmp/check_icon.py <<'PY'
          from PIL import Image
          im = Image.open('assets/icon-only.png')
          print('icon-only.png size:', im.size, 'mode:', im.mode)
          if im.size != (1024, 1024):
              raise SystemExit(f'icon-only.png must be 1024x1024, got {im.size}')
          PY
          python3 -m py_compile /tmp/check_icon.py
          python3 /tmp/check_icon.py
          echo "$(stat -c%s assets/icon-only.png) bytes  $(shasum -a 256 assets/icon-only.png)"

      - name: Generate Android icons (legacy only, no adaptive split)
        run: bunx capacitor-assets generate --android --assetPath assets

      - name: Force legacy ic_launcher (remove adaptive XML & foreground/background)
        run: |
          set -e
          # Remove adaptive icon XMLs so Android falls back to legacy ic_launcher.png
          rm -f android/app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml \
                android/app/src/main/res/mipmap-anydpi-v26/ic_launcher_round.xml
          # Remove foreground/background bitmaps so nothing references them
          rm -f android/app/src/main/res/mipmap-*/ic_launcher_foreground.png \
                android/app/src/main/res/mipmap-*/ic_launcher_background.png \
                android/app/src/main/res/mipmap-*/ic_launcher_foreground.webp \
                android/app/src/main/res/mipmap-*/ic_launcher_background.webp
          # Drop anydpi-v26 dir if empty
          if [ -d android/app/src/main/res/mipmap-anydpi-v26 ] && [ -z "$(ls -A android/app/src/main/res/mipmap-anydpi-v26)" ]; then
            rmdir android/app/src/main/res/mipmap-anydpi-v26
          fi
          # Remove any colors that reference ic_launcher_background
          if [ -f android/app/src/main/res/values/ic_launcher_background.xml ]; then
            rm -f android/app/src/main/res/values/ic_launcher_background.xml
          fi

      - name: Overwrite ic_launcher.png with crisp downscale from icon-only.png
        run: |
          set -e
          cat > /tmp/resize_launchers.py <<'PY'
          from PIL import Image
          import os, glob
          src = Image.open('assets/icon-only.png').convert('RGBA')
          # Standard launcher sizes per density
          sizes = {
              'mipmap-mdpi':    48,
              'mipmap-hdpi':    72,
              'mipmap-xhdpi':   96,
              'mipmap-xxhdpi':  144,
              'mipmap-xxxhdpi': 192,
          }
          base = 'android/app/src/main/res'
          for d, sz in sizes.items():
              folder = os.path.join(base, d)
              os.makedirs(folder, exist_ok=True)
              # Single high-quality LANCZOS downscale from 1024 source (no repeated resize)
              out = src.resize((sz, sz), Image.LANCZOS)
              out.save(os.path.join(folder, 'ic_launcher.png'), 'PNG', optimize=True)
              out.save(os.path.join(folder, 'ic_launcher_round.png'), 'PNG', optimize=True)
              # Remove any leftover .webp variants so PNG takes effect
              for ext in ('webp',):
                  for f in glob.glob(os.path.join(folder, f'ic_launcher.{ext}')):
                      os.remove(f)
                  for f in glob.glob(os.path.join(folder, f'ic_launcher_round.{ext}')):
                      os.remove(f)
              print(f'wrote {d}/ic_launcher.png at {sz}x{sz}')
          PY
          python3 -m py_compile /tmp/resize_launchers.py
          python3 /tmp/resize_launchers.py

      - name: Verify generated launcher icons
        run: |
          set -e
          echo "--- mipmap dirs ---"
          ls android/app/src/main/res/ | grep mipmap || true
          for d in android/app/src/main/res/mipmap-*/; do
            echo "== $d =="
            ls -la "$d" || true
          done
          echo "--- ic_launcher.png sizes & SHA256 ---"
          for f in $(ls android/app/src/main/res/mipmap-*/ic_launcher.png 2>/dev/null); do
            echo "$(stat -c%s "$f") bytes  $(shasum -a 256 "$f")  $f"
          done
          echo "--- ic_launcher_round.png sizes & SHA256 ---"
          for f in $(ls android/app/src/main/res/mipmap-*/ic_launcher_round.png 2>/dev/null); do
            echo "$(stat -c%s "$f") bytes  $(shasum -a 256 "$f")  $f"
          done
          COUNT=$(ls android/app/src/main/res/mipmap-*/ic_launcher.png 2>/dev/null | wc -l)
          if [ "$COUNT" -lt 5 ]; then
            echo "❌ Expected 5 ic_launcher.png files, got $COUNT"; exit 1
          fi
          if ls android/app/src/main/res/mipmap-anydpi-v26/ic_launcher*.xml 2>/dev/null; then
            echo "❌ adaptive icon XML still present"; exit 1
          fi
          MANIFEST=android/app/src/main/AndroidManifest.xml
          # Ensure AndroidManifest references only @mipmap/ic_launcher (round may also point to ic_launcher)
          grep -q 'android:icon="@mipmap/ic_launcher"' "$MANIFEST" || (echo "❌ android:icon missing"; exit 1)
          # Rewrite roundIcon to ic_launcher (no separate round adaptive)
          sed -i 's#android:roundIcon="@mipmap/ic_launcher_round"#android:roundIcon="@mipmap/ic_launcher"#g' "$MANIFEST"
          echo "✅ Legacy ic_launcher.png in place; adaptive XML removed; manifest OK"


      - name: Generate splash screen drawables
        run: |
          set -e
          if [ ! -f assets/splash.png ]; then
            echo "❌ assets/splash.png not found"
            exit 1
          fi
          python3 -m pip install --quiet --disable-pip-version-check Pillow
          cat > /tmp/gen_splash.py <<'PY'
          from PIL import Image
          import os
          src = Image.open('assets/splash.png').convert('RGB')
          # 정사각형으로 강제 (이미 정사각형이면 그대로)
          w, h = src.size
          side = min(w, h)
          left = (w - side) // 2
          top = (h - side) // 2
          src = src.crop((left, top, left + side, top + side))
          # 표준 splash 사이즈 (px) — Capacitor 기본 splash.png 위치들
          sizes = {
              'drawable':           480,
              'drawable-port-mdpi': 320,
              'drawable-port-hdpi': 480,
              'drawable-port-xhdpi': 720,
              'drawable-port-xxhdpi': 960,
              'drawable-port-xxxhdpi': 1280,
              'drawable-land-mdpi': 480,
              'drawable-land-hdpi': 800,
              'drawable-land-xhdpi': 1280,
              'drawable-land-xxhdpi': 1600,
              'drawable-land-xxxhdpi': 1920,
          }
          base = 'android/app/src/main/res'
          for d, sz in sizes.items():
              folder = os.path.join(base, d)
              os.makedirs(folder, exist_ok=True)
              out = src.resize((sz, sz), Image.LANCZOS)
              out.save(os.path.join(folder, 'splash.png'), 'PNG', optimize=True)
              print(f'wrote {d}/splash.png at {sz}x{sz}')
          PY
          python3 /tmp/gen_splash.py
          echo "✅ splash.png drawables generated"

      - name: Clean Android build cache (drop stale icon resources)
        working-directory: android
        run: ./gradlew --no-daemon clean


      - name: Build signed release AAB
        working-directory: android
        run: ./gradlew --no-daemon bundleRelease

      - name: Collect AAB
        run: |
          cp android/app/build/outputs/bundle/release/app-release.aab release/app-release.aab
          shasum -a 256 release/app-release.aab > release/app-release.aab.sha256

      - name: Upload Google Play AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: zibda-google-play-app-release-aab
          path: |
            release/app-release.aab
            release/app-release.aab.sha256
          retention-days: 14

      - name: Upload generated keystore (only if auto-generated)
        if: steps.signing.outputs.generated == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: zibda-release-keystore-SAVE-THIS
          path: |
            release/zibda-release.keystore
            release/zibda-release.keystore.base64.txt
            release/KEYSTORE_CREDENTIALS.txt
          retention-days: 90
