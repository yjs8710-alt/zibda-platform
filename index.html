<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Zibda - 청주 부동산 공실 관리 플랫폼">
    <title>Zibda Platform - 부동산 공실 관리</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            text-align: center;
            color: white;
            padding: 60px 40px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 20px;
            max-width: 600px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        h1 {
            font-size: 3.5em;
            margin-bottom: 20px;
            font-weight: 700;
            letter-spacing: -1px;
            animation: slideDown 0.8s ease-out;
        }

        .subtitle {
            font-size: 1.5em;
            margin-bottom: 30px;
            opacity: 0.95;
            animation: fadeIn 1s ease-out 0.2s both;
        }

        .description {
            font-size: 1.1em;
            line-height: 1.8;
            margin-bottom: 40px;
            opacity: 0.9;
            animation: fadeIn 1s ease-out 0.4s both;
        }

        .features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
            animation: fadeIn 1s ease-out 0.6s both;
        }

        .feature {
            padding: 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .feature-icon {
            font-size: 2em;
            margin-bottom: 10px;
        }

        .feature-text {
            font-size: 0.9em;
            opacity: 0.95;
        }

        .status {
            margin-top: 40px;
            padding-top: 40px;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            font-size: 0.95em;
            opacity: 0.85;
            animation: fadeIn 1s ease-out 0.8s both;
        }

        .status-item {
            margin: 10px 0;
        }

        .badge {
            display: inline-block;
            background: rgba(76, 255, 102, 0.3);
            color: #4cff66;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.85em;
            border: 1px solid #4cff66;
            margin: 5px;
        }

        @media (max-width: 600px) {
            .container {
                padding: 40px 25px;
            }

            h1 {
                font-size: 2.5em;
            }

            .subtitle {
                font-size: 1.2em;
            }

            .description {
                font-size: 1em;
            }

            .features {
                grid-template-columns: 1fr;
            }
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .pulse {
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 0.9;
            }
            50% {
                opacity: 1;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏠 Zibda</h1>
        
        <p class="subtitle">청주 부동산 공실 관리 플랫폼</p>
        
        <p class="description">
            최고 품질의 부동산 공실 관리 서비스<br>
            효율적인 매물 관리와 소유주 연락처 통합 관리
        </p>

        <div class="features">
            <div class="feature">
                <div class="feature-icon">📋</div>
                <div class="feature-text">공실 관리</div>
            </div>
            <div class="feature">
                <div class="feature-icon">👥</div>
                <div class="feature-text">소유주 관리</div>
            </div>
            <div class="feature">
                <div class="feature-icon">📊</div>
                <div class="feature-text">통계 분석</div>
            </div>
            <div class="feature">
                <div class="feature-icon">📱</div>
                <div class="feature-text">모바일 지원</div>
            </div>
        </div>

        <div class="status">
            <div class="status-item">
                <span class="badge">✅ Vercel 배포 완료</span>
            </div>
            <div class="status-item">
                <span class="badge">✅ Lovable 마이그레이션 완료</span>
            </div>
            <div class="status-item">
                <span class="badge">✅ 독립 운영 시작</span>
            </div>
            <p style="margin-top: 20px; font-size: 0.9em;">
                2024년 06월 29일 배포<br>
                청주 지역 부동산 시장의 새로운 표준
            </p>
        </div>
    </div>
</body>
</html>
