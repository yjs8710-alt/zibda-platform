  <body>
    <script>
      (function(){
        var ua = navigator.userAgent || '';
        var skip = window.matchMedia('(display-mode: standalone)').matches || navigator.standalone === true || !!(window.Capacitor || /Capacitor|wv|; wv\)/i.test(ua)) || location.protocol === 'capacitor:' || location.protocol === 'ionic:';
        if (skip) document.documentElement.classList.add('zibda-no-splash');
      })();
    </script>
    <style>
      #zibda-splash{position:fixed;inset:0;z-index:2147483647;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#22d3ee 0%,#a855f7 52%,#ec4899 100%);transition:opacity .25s ease;}
      #zibda-splash.hide{opacity:0;pointer-events:none;}
      #zibda-splash .z-logo{font-family:'Pretendard','Apple SD Gothic Neo',system-ui,sans-serif;font-weight:800;font-size:54px;letter-spacing:-0.02em;color:#fff;text-shadow:0 4px 24px rgba(0,0,0,.25);animation:zPulse 1.4s ease-in-out infinite;}
      @keyframes zPulse{0%,100%{transform:scale(1);opacity:.95;}50%{transform:scale(1.05);opacity:1;}}
      @media (min-width: 768px){#zibda-splash{display:none;}}
      html.zibda-no-splash #zibda-splash{display:none!important;}
      @media (display-mode: standalone){#zibda-splash{display:none!important;}}
    </style>
    <div id="zibda-splash"><div class="z-logo">Zibda</div></div>
    <script>
      (function(){
        var isStandalone = window.matchMedia('(display-mode: standalone)').matches || navigator.standalone === true;
        var isCapacitor = !!(window.Capacitor || /Capacitor|wv|; wv\)/i.test(navigator.userAgent||'') || location.protocol === 'capacitor:' || location.protocol === 'ionic:');
        var isMobile = /Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent||'');
        var el = document.getElementById('zibda-splash');
        if (!el) return;
        // 설치된 앱(PWA/Capacitor) 또는 데스크톱에서는 스플래시 즉시 제거
        if (!isMobile || isStandalone || isCapacitor) { el.parentNode && el.parentNode.removeChild(el); return; }
        var hide = function(){ el.classList.add('hide'); setTimeout(function(){ el.parentNode && el.parentNode.removeChild(el); }, 400); };
        window.addEventListener('load', function(){ setTimeout(hide, 250); });
        setTimeout(hide, 1200);
      })();
    </script>
    <div id="root"></div>

    <script>
      (function () {
        try {
          var match = window.location.pathname.match(/^\/property\/([^/]+)$/);
          if (match) {
            window.location.replace('/share/' + match[1] + window.location.search + window.location.hash);
            return;
          }
          var SW_CLEAN_KEY = '__sw_cleaned_v4_stable__';
          var isPreview = /lovableproject\.com|id-preview--|localhost|127\.0\.0\.1/.test(window.location.hostname);
          if (!isPreview && !localStorage.getItem(SW_CLEAN_KEY)) {
            var run = function () {
              try {
                if ('serviceWorker' in navigator) {
                  navigator.serviceWorker.getRegistrations().then(function (regs) {
                    regs.forEach(function (r) { r.unregister(); });
                  });
                }
                if ('caches' in window) {
                  caches.keys().then(function (keys) {
                    keys.forEach(function (key) { caches.delete(key); });
                  });
                }
              } catch (e) {}
              try { localStorage.setItem(SW_CLEAN_KEY, '1'); } catch (e) {}
            };
            if ('requestIdleCallback' in window) {
              requestIdleCallback(run, { timeout: 3000 });
            } else {
              setTimeout(run, 1500);
            }
          }
        } catch (e) {}
      })();
    </script>
    <!-- Kakao JS SDK는 공유 등 실제 필요 시점에 동적 로딩 (초기 진입 속도 개선) -->
